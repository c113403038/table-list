<!DOCTYPE html>
<html>
<head>
<style>
table {
/* Merges borders into a single line */
border-collapse: collapse;
width: 50%;
}

table, th, td {
border: 1px solid black;
}

th, td {
/* Adds the 5px space requested */
padding: 5px;
/* Aligns text to the left */
text-align: left;
}
</style>
</head>
<body>

<h2>Student Information Table</h2>

<table>
<tr>
<th>Name</th>
<th>Student ID</th>
</tr>
<tr>
<td>Your Name</td>
<td>Your Student ID</td>
</tr>
</table>

</body>
</html>
